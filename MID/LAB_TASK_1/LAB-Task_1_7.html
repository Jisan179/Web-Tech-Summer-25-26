<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-Task_1.7</title>
</head>
<body>
    <h1 style="text-align: center;">InternShip Confirmation Form</h1>
    <form>
        <table>
            <tr>
                <td>
                    Student Name:
                </td>
                <td>
                    <input type="Text"name="StudentName">
                </td>
            </tr>
            <tr>
                <td>
                    E-mail:
                </td>
                <td>
                    <input type="text"name="E-mail">
                </td>
            </tr>
            <tr>
                <td>Prefered InternShip: </td>
                <td>
                    <input type="radio"name="Prefered InternShip"value="On-Site">On-site
                    <input type="radio"name="Prefered InternShip"value="Remote">Remote
                </td>
            </tr>
            <tr>
                <td>
                    InternShip Duration: 
                </td>
                <td>
                    <select name="Duration">
                        <option value="6_weels">6 weeks</option>
                        <option value="3_Months">3 Month</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Skills of Interest: </td>
                <td>
                    <input type="checkbox"name="Skills of Interest"value="Web Development">Web Development <br>
                    <input type="checkbox"name="Skills of Interest"value="Data Analysis">Data Analysis <br>
                    <input type="checkbox"name="Skills of Interest"value="Mobile Apps">Mobile Apps<br>

                </td>
            </tr>
            <tr>
                
                <td>
                    <input type="button"name="Submit"value="Submit">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
